<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Kactus - Shop</title>

<link rel="stylesheet" href="../lib/css/styleguide.css">
<link rel="stylesheet" href="../lib/css/gridsystem.css">
<link rel="stylesheet" href="../css/storetheme.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
</style>

</head>

<body>

<!-- HEADER -->
<header class="top-bar container">
  <div class="display-flex flex-justify-between flex-align-center">
    <a href="landing.html" class="site-title">NEON KACTUS®</a>
    <nav class="top-nav">
      <a href="#">All Plants</a>
      <a href="#">Indoor</a>
      <a href="#">Outdoor</a>
      <a href="#">Planters</a>
    </nav>
    <span class="cart-link">Cart (0)</span>
  </div>
</header>

<!-- TITLE -->
<section class="sg-section container" style="margin-bottom: 2rem;">
  <p class="label-accent" style="font-style: italic;">curated collection</p>
  <h1>SHOP</h1>
</section>

<!-- FILTERS -->
<section class="container" style="margin-bottom: 2rem;">
  <div class="filter-row">
    <button class="pill active">All</button>
    <button class="pill">Indoor</button>
    <button class="pill">Low Light</button>
    <button class="pill">Pet Friendly</button>
    <button class="pill">Easy Care</button>
  </div>
</section>

<!-- PRODUCT GRID -->
<section class="sg-section container">
  <div class="grid gap">
    <!-- Product 1 -->
    <div class="col-12 col-md-4">
      <a href="product.html" class="product-card-link">
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="../images/fiddle-leaf-fig.jpg" alt="Fiddle Leaf Fig">
            <button class="favorite-btn" onclick="event.preventDefault();">♡</button>
          </div>
          <div class="product-info">
            <h3 class="product-name">Fiddle Leaf Fig</h3>
            <p class="product-price">$89</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Product 2 -->
    <div class="col-12 col-md-4">
      <a href="product.html" class="product-card-link">
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="../images/monstera.jpg" alt="Monstera Deliciosa">
            <button class="favorite-btn" onclick="event.preventDefault();">♡</button>
          </div>
          <div class="product-info">
            <h3 class="product-name">Monstera Deliciosa</h3>
            <p class="product-price">$65</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Product 3 -->
    <div class="col-12 col-md-4">
      <a href="product.html" class="product-card-link">
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="../images/snake-plant.jpg" alt="Snake Plant">
            <button class="favorite-btn" onclick="event.preventDefault();">♡</button>
          </div>
          <div class="product-info">
            <h3 class="product-name">Snake Plant</h3>
            <p class="product-price">$45</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Product 4 -->
    <div class="col-12 col-md-4">
      <a href="product.html" class="product-card-link">
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="../images/pothos.jpg" alt="Golden Pothos">
            <button class="favorite-btn" onclick="event.preventDefault();">♡</button>
          </div>
          <div class="product-info">
            <h3 class="product-name">Golden Pothos</h3>
            <p class="product-price">$32</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Product 5 -->
    <div class="col-12 col-md-4">
      <a href="product.html" class="product-card-link">
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="../images/fiddle-leaf-fig.jpg" alt="Fiddle Leaf Fig (Large)">
            <button class="favorite-btn" onclick="event.preventDefault();">♡</button>
          </div>
          <div class="product-info">
            <h3 class="product-name">Fiddle Leaf Fig (Large)</h3>
            <p class="product-price">$129</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Product 6 -->
    <div class="col-12 col-md-4">
      <a href="product.html" class="product-card-link">
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="../images/monstera.jpg" alt="Monstera (Mini)">
            <button class="favorite-btn" onclick="event.preventDefault();">♡</button>
          </div>
          <div class="product-info">
            <h3 class="product-name">Monstera (Mini)</h3>
            <p class="product-price">$38</p>
          </div>
        </div>
      </a>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer container">
  <div class="footer-bottom">
    <p>© 2026 Neon Kactus</p>
    <a href="../index.html" class="back-link">← Back to Style Guide</a>
  </div>
</footer>

</body>
</html>
